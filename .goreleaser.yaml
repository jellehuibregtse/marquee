version: 2

project_name: marquee

builds:
  - main: ./cmd/marquee
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - formats:
      - tar.gz
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^feat(\(.*\))?!?:'
      order: 0
    - title: Bug fixes
      regexp: '^fix(\(.*\))?!?:'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - '^chore(\(.*\))?!?:'
      - '^docs(\(.*\))?!?:'

# goreleaser 2.x deprecated `brews` in favor of `homebrew_casks`.
homebrew_casks:
  - name: marquee
    repository:
      owner: jellehuibregtse
      name: homebrew-tap
    homepage: https://github.com/jellehuibregtse/marquee
    description: Local reverse proxy that shows branch, worktree, and PR info in a bar injected into your dev server's HTML
    # The tap repo does not exist yet. This stays true until a human opens the
    # publication gate and creates the tap; nothing may push to it before then.
    skip_upload: true
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/marquee"]
          end
